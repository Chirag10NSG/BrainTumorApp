<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Tumor Guide CMS</title>
  </head>
  <body>
    <main style="font-family: system-ui, sans-serif; max-width: 42rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5;">
      <h1>Brain Tumor Guide CMS</h1>
      <p>This project now uses Pages CMS with GitHub instead of the old Netlify CMS setup.</p>
      <p>
        Open
        <a href="https://pagescms.org" target="_blank" rel="noreferrer">Pages CMS</a>
        and sign in with the GitHub account that can access this repository.
      </p>
      <p>
        Pages CMS will read the repository's root
        <code>.pages.yml</code>
        configuration and let you edit the site content there.
      </p>
    </main>
  </body>
</html>
