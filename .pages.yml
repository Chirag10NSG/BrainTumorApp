media:
  input: images/uploads
  output: /images/uploads

content:
  - name: site
    label: Website Content
    type: file
    path: content/site.json
    format: json
    fields:
      - name: hero
        label: Top of Page
        type: object
        fields:
          - name: eyebrow
            label: Small Label Above Title
            type: string
          - name: title
            label: Main Headline
            type: string
          - name: description
            label: Intro Paragraph
            type: text
          - name: primaryCta
            label: Primary Button
            type: object
            fields:
              - name: label
                label: Button Text
                type: string
              - name: href
                label: Button Link
                type: string
          - name: secondaryCta
            label: Secondary Button
            type: object
            fields:
              - name: label
                label: Button Text
                type: string
              - name: href
                label: Button Link
                type: string
          - name: focusCard
            label: Focus Card
            type: object
            fields:
              - name: label
                label: Small Label
                type: string
              - name: title
                label: Card Title
                type: string
              - name: description
                label: Card Description
                type: text
          - name: urgentCard
            label: Urgent Help Card
            type: object
            fields:
              - name: label
                label: Small Label
                type: string
              - name: title
                label: Warning Title
                type: string
              - name: description
                label: Warning Description
                type: text
      - name: infoStrip
        label: Three Intro Cards
        type: object
        list:
          min: 3
          max: 3
          collapsible:
            collapsed: false
            summary: "{title}"
        fields:
          - name: title
            label: Card Title
            type: string
          - name: body
            label: Card Text
            type: text
      - name: directory
        label: Tumor Directory Section
        type: object
        fields:
          - name: eyebrow
            label: Small Label
            type: string
          - name: title
            label: Section Title
            type: string
          - name: description
            label: Section Description
            type: text
      - name: careGuide
        label: Doctor Visit Questions
        type: object
        fields:
          - name: eyebrow
            label: Small Label
            type: string
          - name: title
            label: Section Title
            type: string
          - name: groups
            label: Question Groups
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{title}"
            fields:
              - name: title
                label: Group Heading
                type: string
              - name: items
                label: Questions
                type: string
                list: true
      - name: sources
        label: Source Links
        type: object
        fields:
          - name: eyebrow
            label: Small Label
            type: string
          - name: title
            label: Section Title
            type: string
          - name: description
            label: Section Description
            type: text
          - name: links
            label: Source Links
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{label}"
            fields:
              - name: label
                label: Visible Link Label
                type: string
              - name: url
                label: Website Address
                type: string

  - name: tumors
    label: Tumor Types
    type: file
    path: content/tumors.json
    format: json
    list: true
    fields:
      - name: name
        label: Tumor Name
        type: string
      - name: subtitle
        label: Short Subtitle
        type: string
      - name: grade
        label: Grade Label
        type: string
      - name: summary
        label: Plain-Language Summary
        type: text
      - name: symptoms
        label: Common Symptoms
        type: text
      - name: diagnosis
        label: How It Is Diagnosed
        type: text
      - name: treatment
        label: Common Treatment Options
        type: text
      - name: questions
        label: Questions Patients May Want To Ask
        type: text
      - name: tags
        label: Tags For Filters
        type: select
        list: true
        options:
          values:
            - value: common
              label: Common
            - value: usually-benign
              label: Usually benign
            - value: cancerous
              label: Often cancerous
            - value: adult
              label: Often in adults
            - value: pediatric
              label: Often in children

settings:
  hide: true
