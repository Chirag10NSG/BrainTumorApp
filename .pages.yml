media:
  input: images/uploads
  output: /images/uploads

content:
  - name: site
    label: Website Content
    type: file
    path: content/site.json
    format: code

  - name: tumors
    label: Tumor Types
    type: file
    path: content/tumors.json
    format: json
    list: true
    fields:
      - name: name
        label: Tumor Name
        type: string
      - name: subtitle
        label: Short Subtitle
        type: string
      - name: grade
        label: Grade Label
        type: string
      - name: summary
        label: Plain-Language Summary
        type: text
      - name: symptoms
        label: Common Symptoms
        type: text
      - name: diagnosis
        label: How It Is Diagnosed
        type: text
      - name: treatment
        label: Common Treatment Options
        type: text
      - name: questions
        label: Questions Patients May Want To Ask
        type: text
      - name: tags
        label: Tags For Filters
        type: select
        options:
          multiple: true
          values:
            - value: common
              label: Common
            - value: usually-benign
              label: Usually benign
            - value: cancerous
              label: Often cancerous
            - value: adult
              label: Often in adults
            - value: pediatric
              label: Often in children

settings:
  hide: true
